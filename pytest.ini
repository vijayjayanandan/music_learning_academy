[pytest]
DJANGO_SETTINGS_MODULE = config.settings.dev
python_files = tests.py test_*.py *_tests.py
pythonpath = .
testpaths = tests
addopts = --cov=apps --cov-report=term-missing --cov-config=.coveragerc
markers =
    unit: Unit tests (models, forms, utilities)
    integration: Integration tests (views, permissions, redirects)
    e2e: End-to-end tests with Playwright (browser-based)
    slow: Slow tests that should be skipped in quick runs
