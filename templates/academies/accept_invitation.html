{% extends "base.html" %}
{% block title %}Accept Invitation{% endblock %}
{% block content %}
<div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body text-center">
        <h2 class="card-title justify-center">You're Invited!</h2>
        <p class="py-4">You've been invited to join <strong>{{ invitation.academy.name }}</strong> as a <strong>{{ invitation.role|title }}</strong>.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary">Accept Invitation</button>
        </form>
    </div>
</div>
{% endblock %}
