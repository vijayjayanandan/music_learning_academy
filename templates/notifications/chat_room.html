{% extends "base.html" %}
{% block title %}Chat - {{ course.title }}{% endblock %}
{% block content %}
<div class="space-y-4">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold">{{ course.title }} — Chat</h1>
        <a href="{% url 'course-detail' course.slug %}" class="btn btn-ghost btn-sm">Back to Course</a>
    </div>
    <div class="card bg-base-100 shadow">
        <div class="card-body" style="max-height: 500px; overflow-y: auto;" id="chat-box">
            <div id="chat-messages">
                {% include "notifications/partials/_chat_messages.html" %}
            </div>
        </div>
    </div>
    <form method="post" hx-post="{% url 'course-chat' course.slug %}" hx-target="#chat-messages" hx-swap="innerHTML">
        {% csrf_token %}
        <div class="flex gap-2">
            <input type="text" name="message" class="input input-bordered flex-1" placeholder="Type a message..." autocomplete="off" required>
            <button type="submit" class="btn btn-primary">Send</button>
        </div>
    </form>
</div>
{% endblock %}
