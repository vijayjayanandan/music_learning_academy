<div id="progress-{{ lesson.pk }}" class="flex items-center justify-between py-3 border-b last:border-0">
    <div class="flex items-center gap-3">
        <form method="post" action="{% url 'mark-lesson-complete' enrollment.pk lesson.pk %}"
              hx-post="{% url 'mark-lesson-complete' enrollment.pk lesson.pk %}"
              hx-target="#progress-{{ lesson.pk }}" hx-swap="outerHTML">
            {% csrf_token %}
            <button type="submit" class="btn btn-circle btn-sm {% if progress.is_completed %}btn-success{% else %}btn-outline{% endif %}">
                {% if progress.is_completed %}&#10003;{% endif %}
            </button>
        </form>
        <div>
            <span class="font-medium {% if progress.is_completed %}line-through text-gray-400{% endif %}">
                {{ lesson.order }}. {{ lesson.title }}
            </span>
            <p class="text-xs text-gray-500">{{ lesson.estimated_duration_minutes }} min</p>
        </div>
    </div>
</div>
