{% extends "base.html" %}
{% block title %}Edit Profile - Music Academy{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="breadcrumbs text-sm mb-4">
        <ul>
            <li><a href="{% url 'dashboard' %}">Dashboard</a></li>
            <li><a href="{% url 'profile' %}">My Profile</a></li>
            <li>Edit Profile</li>
        </ul>
    </div>
    <h1 class="text-3xl font-bold mb-6">Edit Profile</h1>
    <div class="card bg-base-100 shadow">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">{{ field.label }}</span></label>
                    {{ field }}
                    {% for error in field.errors %}
                    <label class="label"><span class="label-text-alt text-error">{{ error }}</span></label>
                    {% endfor %}
                </div>
                {% endfor %}
                <div class="card-actions justify-end mt-4">
                    <a href="{% url 'profile' %}" class="btn btn-ghost">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
