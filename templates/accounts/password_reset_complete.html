{% extends "base.html" %}
{% block title %}Password Reset Complete - Music Academy{% endblock %}

        <h2 class="card-title text-2xl justify-center mb-2">&#9835; Music Academy</h2>

        <a href="{% url 'login' %}" class="btn btn-primary">Sign In</a>
    </div>
</div>
{% endblock %}
