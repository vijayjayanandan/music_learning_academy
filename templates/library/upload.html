{% extends "base.html" %}
{% block title %}Upload Resource{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-3xl font-bold mb-6">Upload Resource</h1>
    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">Title</span></label>
                    <input type="text" name="title" class="input input-bordered w-full" required>
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">Type</span></label>
                    <select name="resource_type" class="select select-bordered w-full">
                        {% for value, label in resource_types %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">File</span></label>
                    <input type="file" name="file" class="file-input file-input-bordered w-full" required>
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">Description</span></label>
                    <textarea name="description" class="textarea textarea-bordered w-full" rows="3"></textarea>
                </div>
                <div class="flex gap-4 mb-4">
                    <div class="form-control flex-1">
                        <label class="label"><span class="label-text">Instrument</span></label>
                        <input type="text" name="instrument" class="input input-bordered w-full" placeholder="Piano">
                    </div>
                    <div class="form-control flex-1">
                        <label class="label"><span class="label-text">Genre</span></label>
                        <input type="text" name="genre" class="input input-bordered w-full" placeholder="Classical">
                    </div>
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">Difficulty</span></label>
                    <select name="difficulty_level" class="select select-bordered w-full">
                        <option value="">Not specified</option>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-full">Upload</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
