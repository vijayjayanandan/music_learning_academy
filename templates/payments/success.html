{% extends "base.html" %}
{% block title %}Payment Successful{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto text-center">
    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
            <div class="text-6xl mb-4">&#10003;</div>
            <h1 class="text-3xl font-bold text-success mb-4">Payment Successful!</h1>
            <p class="text-base-content/70 mb-6">
                Your payment has been processed. You should receive a confirmation email shortly.
            </p>
            <div class="flex gap-4 justify-center">
                <a href="{% url 'payment-history' %}" class="btn btn-outline">View Receipts</a>
                <a href="{% url 'dashboard' %}" class="btn btn-primary">Go to Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
