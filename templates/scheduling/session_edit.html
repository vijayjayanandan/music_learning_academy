{% extends "base.html" %}
{% block title %}Edit Session - Music Academy{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">Edit Session</h1>
    <div class="card bg-base-100 shadow">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">{{ field.label }}</span></label>
                    {{ field }}
                    {% for error in field.errors %}
                    <label class="label"><span class="label-text-alt text-error">{{ error }}</span></label>
                    {% endfor %}
                </div>
                {% endfor %}
                <div class="card-actions justify-end mt-4">
                    <a href="{% url 'session-detail' object.pk %}" class="btn btn-ghost">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
