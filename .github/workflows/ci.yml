name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Ruff lint
        run: ruff check apps/ config/ tests/

      - name: Ruff format check
        run: ruff format --check apps/ config/ tests/

      - name: Bandit security scan
        run: bandit -r apps/ -c pyproject.toml -q || true

      - name: pip-audit
        run: pip-audit --skip-editable || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Django system check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: python manage.py check --fail-level WARNING

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: python manage.py migrate --noinput

      - name: Check for missing migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: python -m pytest tests/unit tests/integration -v --tb=short --cov=apps --cov-report=term-missing --cov-fail-under=60
