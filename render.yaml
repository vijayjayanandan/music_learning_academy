databases:
  - name: music-academy-db
    plan: free
    databaseName: music_academy
    user: music_academy

services:
  - type: web
    name: music-academy
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: DATABASE_URL
        fromDatabase:
          name: music-academy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: music-academy-redis
          type: redis
          property: connectionString
      - key: REDIS_CACHE_URL
        fromService:
          name: music-academy-redis
          type: redis
          property: connectionString
      - key: SECURE_SSL_REDIRECT
        value: "0"
      - key: WEB_CONCURRENCY
        value: "2"

  - type: redis
    name: music-academy-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
